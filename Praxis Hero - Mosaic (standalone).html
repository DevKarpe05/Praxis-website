document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

amily: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"ed79fbbc-698e-4cf0-8c7f-dda21ba8b39d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"500c3579-db78-48a8-8826-40f6e3df084d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"e1e04c1c-952c-4918-920d-39402bc7f8d4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"ed79fbbc-698e-4cf0-8c7f-dda21ba8b39d\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"500c3579-db78-48a8-8826-40f6e3df084d\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e1e04c1c-952c-4918-920d-39402bc7f8d4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- CORE PALETTE ------------------------------------\n     Praxis lives in a warm, near-monochrome canvas. Bone-cream\n     paper, deep graphite ink, one industrial-orange accent\n     (sodium-vapor / signal-flare), and a cool technical cyan\n     used sparingly for live data and live-system signals.       */\n\n  --bone-50:  #F6F2EA;   /* default canvas */\n  --bone-100: #EFE9DD;\n  --bone-200: #E4DDCD;\n  --bone-300: #CFC6B2;\n\n  --ink-900:  #14130F;   /* primary text — warm near-black */\n  --ink-800:  #1F1D17;\n  --ink-700:  #2E2B22;\n  --ink-600:  #45412F;\n  --ink-500:  #6B6650;\n  --ink-400:  #908A70;\n  --ink-300:  #B5AE92;\n\n  --flare-600: #C2410C;  /* darker hover */\n  --flare-500: #E04A0B;  /* PRAXIS ORANGE — primary accent */\n  --flare-400: #F26A1E;\n  --flare-200: #F9C9A8;\n  --flare-50:  #FCEFE2;\n\n  --signal-700: #0E6A7A;\n  --signal-500: #14A4BC;  /* technical cyan — live data / streams */\n  --signal-200: #A8E1EC;\n  --signal-50:  #E5F6FA;\n\n  --alert-500: #B23A30;   /* anomaly / failure */\n  --ok-500:    #2F7D3E;   /* nominal / success */\n  --warn-500:  #B8860B;   /* caution */\n\n  /* ---------- SURFACE TOKENS --------------------------------- */\n  --bg:           var(--bone-50);\n  --bg-elev:     #FBF8F2;\n  --bg-inset:    var(--bone-100);\n  --bg-ink:      var(--ink-900);\n  --bg-ink-elev: #1C1A14;\n\n  /* ---------- FOREGROUND TOKENS ----------------------------- */\n  --fg1: var(--ink-900);  /* primary text */\n  --fg2: var(--ink-700);  /* secondary text */\n  --fg3: var(--ink-500);  /* tertiary / meta */\n  --fg4: var(--ink-400);  /* placeholder / disabled label */\n  --fg-on-ink:  var(--bone-50);\n  --fg-on-ink-2: #B8B19A;\n\n  --accent:        var(--flare-500);\n  --accent-hover:  var(--flare-600);\n  --accent-soft:   var(--flare-50);\n  --signal:        var(--signal-500);\n  --signal-soft:   var(--signal-50);\n\n  /* ---------- BORDERS / RULES ------------------------------- */\n  --rule-1: rgba(20,19,15,0.10);   /* hairline default */\n  --rule-2: rgba(20,19,15,0.20);   /* card / divider */\n  --rule-3: rgba(20,19,15,0.40);   /* strong */\n  --rule-ink: rgba(246,242,234,0.16); /* on dark */\n\n  /* ---------- TYPE FAMILIES --------------------------------- */\n  --font-sans:    'Space Grotesk', 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;\n  --font-serif:   'Instrument Serif', Georgia, serif; /* editorial accent only */\n\n  /* ---------- TYPE SCALE (1.25 mod, anchored at 16) -------- */\n  --t-xs:   11px;\n  --t-sm:   13px;\n  --t-base: 15px;\n  --t-md:   17px;\n  --t-lg:   20px;\n  --t-xl:   26px;\n  --t-2xl:  34px;\n  --t-3xl:  44px;\n  --t-4xl:  60px;\n  --t-5xl:  84px;\n  --t-6xl: 120px;\n\n  /* ---------- SEMANTIC TYPE (composition shortcuts) -------- */\n  /* applied via the matching utility classes below */\n\n  /* ---------- SPACING (4px base) --------------------------- */\n  --s-0: 0;\n  --s-1: 4px;\n  --s-2: 8px;\n  --s-3: 12px;\n  --s-4: 16px;\n  --s-5: 20px;\n  --s-6: 24px;\n  --s-8: 32px;\n  --s-10: 40px;\n  --s-12: 48px;\n  --s-16: 64px;\n  --s-20: 80px;\n  --s-24: 96px;\n  --s-32: 128px;\n\n  /* ---------- RADII ---------------------------------------- *\n     Praxis prefers sharp corners. Radii are reserved for\n     pills, status chips, avatars. Cards stay square.          */\n  --r-0:  0;\n  --r-1:  2px;\n  --r-2:  4px;\n  --r-3:  8px;\n  --r-pill: 999px;\n\n  /* ---------- ELEVATION ------------------------------------- *\n     Shadows are tight, low, and never blurry. Praxis surfaces\n     read like layered industrial paper, not floating glass.   */\n  --shadow-0:  none;\n  --shadow-1:  0 1px 0 rgba(20,19,15,0.06), 0 1px 2px rgba(20,19,15,0.04);\n  --shadow-2:  0 1px 0 rgba(20,19,15,0.08), 0 2px 6px rgba(20,19,15,0.06);\n  --shadow-3:  0 2px 0 rgba(20,19,15,0.10), 0 8px 24px rgba(20,19,15,0.08);\n  --shadow-inset: inset 0 0 0 1px var(--rule-1);\n\n  /* ---------- MOTION --------------------------------------- *\n     Praxis motion is mechanical: short, linear-ish, and\n     decisive. No bouncy easing.                                */\n  --ease-out: cubic-bezier(0.2, 0.7, 0.2, 1);\n  --ease-in:  cubic-bezier(0.6, 0.0, 0.8, 0.3);\n  --dur-1: 90ms;\n  --dur-2: 160ms;\n  --dur-3: 260ms;\n\n  /* ---------- GRID OVERLAY (motif) ------------------------- */\n  --grid-line: rgba(20,19,15,0.05);\n  --grid-line-strong: rgba(20,19,15,0.10);\n}\n\n/* =============== DARK SURFACE TOKENS ====================== *\n   Praxis dark mode is a graphite control surface, not pure\n   black. Used for telemetry views and the marketing hero.    */\n[data-theme=\"ink\"], .surface-ink {\n  --bg:           var(--ink-900);\n  --bg-elev:      var(--bg-ink-elev);\n  --bg-inset:     #0E0D0A;\n  --fg1: var(--bone-50);\n  --fg2: #C8C2AB;\n  --fg3: #908A70;\n  --fg4: #6B6650;\n  --rule-1: rgba(246,242,234,0.10);\n  --rule-2: rgba(246,242,234,0.18);\n  --rule-3: rgba(246,242,234,0.32);\n  --grid-line: rgba(246,242,234,0.06);\n  --grid-line-strong: rgba(246,242,234,0.12);\n  --shadow-1: 0 1px 0 rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5);\n  --shadow-2: 0 1px 0 rgba(0,0,0,0.4), 0 4px 12px rgba(0,0,0,0.5);\n  color: var(--fg1);\n  background: var(--bg);\n}\n\n/* =============== BASE ==================================== */\nhtml, body {\n  background: var(--bg);\n  color: var(--fg1);\n  font-family: var(--font-sans);\n  font-size: var(--t-base);\n  line-height: 1.45;\n  -webkit-font-smoothing: antialiased;\n  font-feature-settings: 'ss01', 'cv11';\n}\n\n::selection { background: var(--ink-900); color: var(--bone-50); }\n\n/* =============== SEMANTIC TYPE UTILITIES ================== */\n.t-eyebrow {\n  font-family: var(--font-mono);\n  font-size: var(--t-xs);\n  font-weight: 500;\n  letter-spacing: 0.14em;\n  text-transform: uppercase;\n  color: var(--fg3);\n}\n\n.t-display {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: var(--t-5xl);\n  line-height: 0.96;\n  letter-spacing: -0.035em;\n  color: var(--fg1);\n  text-wrap: balance;\n}\n\n.t-h1 {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: var(--t-3xl);\n  line-height: 1.04;\n  letter-spacing: -0.025em;\n  text-wrap: balance;\n}\n\n.t-h2 {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: var(--t-2xl);\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  text-wrap: balance;\n}\n\n.t-h3 {\n  font-family: var(--font-sans);\n  font-weight: 500;\n  font-size: var(--t-xl);\n  line-height: 1.2;\n  letter-spacing: -0.015em;\n}\n\n.t-lead {\n  font-family: var(--font-sans);\n  font-weight: 400;\n  font-size: var(--t-lg);\n  line-height: 1.45;\n  color: var(--fg2);\n  text-wrap: pretty;\n}\n\n.t-body {\n  font-family: var(--font-sans);\n  font-weight: 400;\n  font-size: var(--t-base);\n  line-height: 1.55;\n  color: var(--fg1);\n  text-wrap: pretty;\n}\n\n.t-small {\n  font-family: var(--font-sans);\n  font-size: var(--t-sm);\n  line-height: 1.45;\n  color: var(--fg2);\n}\n\n.t-meta {\n  font-family: var(--font-mono);\n  font-size: var(--t-xs);\n  line-height: 1.4;\n  color: var(--fg3);\n  letter-spacing: 0.04em;\n}\n\n.t-code, code, kbd, samp {\n  font-family: var(--font-mono);\n  font-size: 0.92em;\n  letter-spacing: 0;\n}\n\n.t-editorial {\n  font-family: var(--font-serif);\n  font-weight: 400;\n  font-style: italic;\n  font-size: var(--t-3xl);\n  line-height: 1.1;\n  letter-spacing: -0.01em;\n  color: var(--fg1);\n}\n\n.t-numeric {\n  font-family: var(--font-mono);\n  font-variant-numeric: tabular-nums;\n  font-feature-settings: 'tnum', 'zero';\n}\n\n/* =============== PRAXIS MOTIFS ============================ */\n\n/* Grid background — the canvas of every dashboard surface. */\n.bg-grid {\n  background-image:\n    linear-gradient(to right,  var(--grid-line) 1px, transparent 1px),\n    linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);\n  background-size: 24px 24px;\n}\n.bg-grid-strong {\n  background-image:\n    linear-gradient(to right,  var(--grid-line-strong) 1px, transparent 1px),\n    linear-gradient(to bottom, var(--grid-line-strong) 1px, transparent 1px);\n  background-size: 48px 48px;\n}\n\n/* Registration mark — corner brackets used to \"frame\" content. */\n.frame-corners { position: relative; }\n.frame-corners::before,\n.frame-corners::after,\n.frame-corners > .fc-tr,\n.frame-corners > .fc-bl {\n  content: '';\n  position: absolute;\n  width: 10px; height: 10px;\n  border: 1px solid var(--fg1);\n  pointer-events: none;\n}\n.frame-corners::before { top: -1px; left: -1px; border-right: 0; border-bottom: 0; }\n.frame-corners::after  { bottom: -1px; right: -1px; border-left: 0; border-top: 0; }\n.frame-corners > .fc-tr { top: -1px; right: -1px; border-left: 0; border-bottom: 0; }\n.frame-corners > .fc-bl { bottom: -1px; left: -1px; border-right: 0; border-top: 0; }\n\n/* Telemetry pill — used to label live signals. */\n.pill-live {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 3px 8px 3px 6px;\n  font-family: var(--font-mono);\n  font-size: var(--t-xs);\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--fg1);\n  border: 1px solid var(--rule-2);\n  border-radius: var(--r-pill);\n  background: var(--bg-elev);\n}\n.pill-live::before {\n  content: '';\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: var(--signal);\n  box-shadow: 0 0 0 3px var(--signal-soft);\n  animation: praxis-pulse 1.6s var(--ease-out) infinite;\n}\n@keyframes praxis-pulse {\n  0%, 100% { opacity: 1; }\n  50% { opacity: 0.3; }\n}\n<\u002Fstyle>\n<script src=\"60e6c1ac-6ab4-4f84-8325-8bcb7bf5a825\"><\u002Fscript>\n<style>\n  html, body { margin:0; background:#14130F; }\n  @keyframes praxis-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.22; } }\n  @keyframes praxis-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }\n  image-slot { border: 0; }\n  a { text-decoration: none; color: inherit; }\n<\u002Fstyle>\n\n<\u002Fhelmet>\n\n<div data-screen-label=\"Praxis hero — mosaic\" data-theme=\"ink\" style=\"position:relative; width:100vw; height:100vh; overflow:hidden; background:#14130F; color:#F6F2EA;\">\n  <!-- mosaic grid -->\n  <div style=\"position:absolute; inset:0; display:grid; grid-template-columns:repeat(4,1fr); grid-template-rows:repeat(3,1fr); gap:2px; filter:grayscale(1) contrast(1.05) brightness(.82);\">\n    <image-slot id=\"mos-1\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"india · diamond\"><\u002Fimage-slot>\n    <image-slot id=\"mos-2\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"uk · refinery\"><\u002Fimage-slot>\n    <image-slot id=\"mos-3\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"tz · bottling\"><\u002Fimage-slot>\n    <image-slot id=\"mos-4\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"peru · mining\"><\u002Fimage-slot>\n    <image-slot id=\"mos-5\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"uk · care\"><\u002Fimage-slot>\n    <image-slot id=\"mos-6\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"india · textiles\"><\u002Fimage-slot>\n    <image-slot id=\"mos-7\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"tz · assembly\"><\u002Fimage-slot>\n    <image-slot id=\"mos-8\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"india · pharma\"><\u002Fimage-slot>\n    <image-slot id=\"mos-9\" style=\"width:100%; height:100%; display:block;\" shape=\"rect\" placeholder=\"tz · field\"
